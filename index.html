<style>
  :root {
    --gold: #B8973A;
    --gold-light: #D4AF5A;
    --gold-pale: #F5EDD6;
    --dark: #0E0E0E;
    --dark-2: #1A1A1A;
    --dark-3: #252525;
    --mid: #6B6B6B;
    --light: #F0EBE1;
    --white: #FDFAF5;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--dark);
    color: var(--light);
    /* 기본 폰트 굵기를 300(Light)에서 400(Regular)로 상향하여 가독성 개선 */
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 400;
    overflow-x: hidden;
  }
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 28px 60px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: linear-gradient(to bottom, rgba(14,14,14,0.95), transparent);
  }
  .nav-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px; /* 로고 크기 상향 */
    font-weight: 600; /* 로고 굵기 상향 */
    letter-spacing: 0.15em;
    color: var(--gold-light);
  }
  .nav-links {
    display: flex;
    gap: 40px;
    list-style: none;
  }
  .nav-links a {
    color: #d0ccc6; /* 기존 #9a9a9a 에서 더 밝은 톤으로 변경 */
    text-decoration: none;
    font-size: 14px; /* 글씨 크기 12px -> 14px 상향 */
    font-weight: 400; /* 굵기 상향 */
    letter-spacing: 0.15em;
    text-transform: uppercase;
    transition: color 0.3s;
  }
  .nav-links a:hover { color: var(--gold-light); }
  
  .hero {
    min-height: 100vh;
    display: flex;
    align-items: center;
    position: relative;
    overflow: hidden;
    padding: 0 60px;
  }
  .hero-bg {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 80% at 70% 50%, rgba(184,151,58,0.07) 0%, transparent 70%),
      radial-gradient(ellipse 40% 60% at 20% 80%, rgba(184,151,58,0.04) 0%, transparent 60%);
  }
  .hero-line {
    position: absolute;
    top: 0; bottom: 0;
    left: 55%;
    width: 1px;
    background: linear-gradient(to bottom, transparent, rgba(184,151,58,0.3) 30%, rgba(184,151,58,0.3) 70%, transparent);
    animation: fadeIn 2s ease forwards;
  }
  .hero-content {
    position: relative;
    z-index: 2;
    max-width: 600px;
    animation: heroReveal 1.2s ease forwards;
    opacity: 0;
  }
  @keyframes heroReveal {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  .hero-eyebrow {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .hero-eyebrow::before {
    content: '';
    display: block;
    width: 40px;
    height: 1px;
    background: var(--gold);
  }
  .hero-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(52px, 8vw, 88px);
    font-weight: 400;
    line-height: 1.05;
    letter-spacing: -0.01em;
    color: var(--white);
    margin-bottom: 12px;
  }
  .hero-name em { font-style: italic; color: var(--gold-light); }
  .hero-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 17px;
    font-weight: 400;
    color: #c0bab0; /* 더 밝게 개선 */
    letter-spacing: 0.08em;
    margin-bottom: 48px;
  }
  .hero-desc {
    font-size: 15px;
    line-height: 2;
    color: #e8e4dc; /* 가독성 상향 */
    max-width: 440px;
    margin-bottom: 56px;
  }
  .hero-stats {
    display: flex;
    gap: 48px;
    margin-bottom: 56px;
  }
  .stat-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 36px;
    font-weight: 400;
    color: var(--gold-light);
    line-height: 1;
  }
  .stat-label {
    font-size: 13px; /* 11px -> 13px 상향 */
    color: #c0bab0; /* 밝기 상향 */
    font-weight: 400;
    letter-spacing: 0.08em;
    margin-top: 6px;
  }
  .btn-primary {
    display: inline-flex;
    align-items: center;
    gap: 14px;
    background: var(--gold);
    color: var(--dark);
    padding: 18px 40px;
    font-size: 14px; /* 버튼 글씨 상향 */
    letter-spacing: 0.15em;
    text-transform: uppercase;
    text-decoration: none;
    font-weight: 600; /* 버튼 글씨를 확실히 굵게 */
    transition: all 0.3s;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .btn-primary:hover { background: var(--gold-light); gap: 20px; }
  .btn-primary svg { transition: transform 0.3s; }
  .btn-primary:hover svg { transform: translateX(4px); }
  
  section { padding: 120px 60px; }
  .section-label {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .section-label::before {
    content: '';
    display: block;
    width: 30px;
    height: 1px;
    background: var(--gold);
  }
  .section-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(34px, 5vw, 54px);
    font-weight: 400;
    line-height: 1.15;
    color: var(--white);
    margin-bottom: 60px;
  }
  .divider {
    width: 100%;
    height: 1px;
    background: linear-gradient(to right, transparent, rgba(184,151,58,0.3), transparent);
    margin: 0;
  }
  
  .about { background: var(--dark-2); }
  .about-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 80px;
    align-items: start;
  }
  .about-text p {
    font-size: 16px;
    line-height: 2;
    color: #e8e4dc;
    margin-bottom: 24px;
  }
  .about-text p strong { color: var(--gold-light); font-weight: 500; }
  .career-list { list-style: none; }
  .career-item {
    padding: 24px 0;
    border-bottom: 1px solid rgba(184,151,58,0.2);
    display: grid;
    grid-template-columns: 100px 1fr;
    gap: 24px;
  }
  .career-year {
    font-family: 'Cormorant Garamond', serif;
    font-size: 15px;
    font-weight: 600;
    color: var(--gold);
    letter-spacing: 0.05em;
    padding-top: 2px;
  }
  .career-info h4 {
    font-size: 15px;
    font-weight: 500;
    color: var(--white);
    margin-bottom: 6px;
    font-family: 'Noto Serif KR', serif;
  }
  .career-info p { font-size: 13px; color: #c0bab0; line-height: 1.6; }
  
  .services { background: var(--dark); }
  .services-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2px;
    background: rgba(184,151,58,0.1);
  }
  .service-card {
    background: var(--dark);
    padding: 48px 40px;
    transition: background 0.4s;
    position: relative;
    overflow: hidden;
    display: block;
    text-decoration: none;
    color: inherit;
  }
  .service-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--gold);
    transform: scaleX(0);
    transition: transform 0.4s;
    transform-origin: left;
  }
  .service-card::after {
    content: '→';
    position: absolute;
    bottom: 40px; right: 40px;
    font-size: 16px;
    color: rgba(184,151,58,0);
    transition: color 0.3s, transform 0.3s;
  }
  .service-card:hover { background: var(--dark-3); }
  .service-card:hover::before { transform: scaleX(1); }
  .service-card:hover::after { color: var(--gold-light); transform: translateX(4px); }
  
  .service-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 48px;
    font-weight: 400;
    /* 투명도를 0.15에서 0.45로 대폭 올려 확실히 보이게 수정 */
    color: rgba(184,151,58,0.45); 
    line-height: 1;
    margin-bottom: 32px;
  }
  .service-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 20px;
    font-weight: 600;
    color: var(--white);
    margin-bottom: 16px;
  }
  .service-desc {
    font-size: 14px;
    line-height: 1.9;
    color: #e8e4dc;
    margin-bottom: 56px;
  }
  .service-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 24px;
  }
  .tag {
    /* 작은 네모 박스 안의 글씨 가시성 대폭 상향 */
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.1em;
    padding: 6px 14px;
    border: 1px solid rgba(184,151,58,0.5); /* 테두리 선명하게 */
    background: rgba(184,151,58,0.1); /* 배경에 옅은 금색 추가 */
    color: var(--gold-light); /* 더 밝은 톤의 글씨 */
  }
  
  .section-more {
    margin-top: 36px;
    text-align: right;
  }
  .section-more a {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gold);
    text-decoration: none;
    transition: gap 0.3s, color 0.3s;
  }
  .section-more a:hover { gap: 14px; color: var(--gold-light); }
  
  .testimonials { background: var(--dark-2); }
  .testimonials-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2px;
    background: rgba(184,151,58,0.1);
  }
  .testimonial-card { background: var(--dark-2); padding: 48px 40px; }
  .quote-mark {
    font-family: 'Cormorant Garamond', serif;
    font-size: 72px;
    color: rgba(184,151,58,0.3);
    line-height: 0.8;
    margin-bottom: 24px;
  }
  .quote-text {
    font-family: 'Noto Serif KR', serif;
    font-size: 15px;
    font-weight: 400;
    line-height: 2;
    color: #e8e4dc;
    margin-bottom: 32px;
  }
  .quote-author { display: flex; align-items: center; gap: 16px; }
  .author-avatar {
    width: 42px; height: 42px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--gold), var(--dark-3));
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    color: var(--dark);
    font-weight: 600;
  }
  .author-name { font-size: 14px; color: var(--white); font-weight: 500; }
  .author-desc { font-size: 12px; color: #c0bab0; margin-top: 4px; }
  
  .cta {
    background: var(--dark-3);
    text-align: center;
    padding: 120px 60px;
    position: relative;
    overflow: hidden;
  }
  .cta::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 80% 100% at 50% 100%, rgba(184,151,58,0.08) 0%, transparent 70%);
  }
  .cta-content { position: relative; z-index: 1; }
  .cta-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(36px, 6vw, 64px);
    font-weight: 400;
    color: var(--white);
    line-height: 1.2;
    margin-bottom: 24px;
  }
  .cta-title em { font-style: italic; color: var(--gold-light); }
  .cta-sub { font-size: 15px; font-weight: 400; color: #d0ccc6; margin-bottom: 56px; line-height: 1.8; }
  .cta-buttons { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
  
  footer {
    background: var(--dark);
    padding: 60px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 1px solid rgba(184,151,58,0.1);
  }
  .footer-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 600;
    color: var(--gold-light);
    letter-spacing: 0.1em;
  }
  .footer-nav { display: flex; gap: 32px; list-style: none; }
  .footer-nav a {
    font-size: 13px;
    font-weight: 400;
